<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基基羽毛球隊 Kikibadminton</title>
    <style>
        /* 網頁基礎設定 */
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }

        /* 頁首藍色橫幅 */
        header {
            background-color: #1a508b;
            color: white;
            padding: 40px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* 白色主內容區塊 */
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 30px 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            color: #1a508b;
            border-bottom: 2px solid #e1e8f0;
            padding-bottom: 10px;
            margin-top: 0;
        }

        /* 測試修改目標框 */
        .test-zone {
            background-color: #e8f4fd;
            border-left: 5px solid #2b92e4;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            font-weight: bold;
            color: #1a508b;
        }

        /* 預約按鈕樣式 */
        .btn {
            display: inline-block;
            background-color: #ff6b6b;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 15px;
            transition: background 0.3s;
            box-shadow: 0 2px 4px rgba(255,107,107,0.3);
        }

        .btn:hover {
            background-color: #ff5252;
        }

        /* 頁尾 */
        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9em;
            color: #777;
            background-color: #e1e8f0;
        }
    </style>
</head>
<body>

    <header>
        <h1>羽毛球 Kikibadminton</h1>
        <p>不曾停歇的浪潮 🌊 讓每一次揮拍都充滿力量！</p>
    </header>

    <div class="container">
        <h2>👋 歡迎來到測試專案頁面</h2>
        <p>這是一個專門用來練習 VS Code 修改、並透過 GitHub Desktop 上傳流程的測試網頁。</p>
        
        <div class="test-zone">
            【測試文字：你可以試著在 VS Code 改成你的名字，看網頁會不會變喔！】
        </div>

        <p>只要修改後順利存檔，並在 GitHub Desktop 完成 Commit 與 Push，上傳就成功了！</p>
        
        <a href="#" class="btn">立即預約球隊練習 🏸</a>
    </div>

    <footer>
        <p>© 2026 基基羽毛球隊. All rights reserved.</p>
    </footer>

</body>
</html>
